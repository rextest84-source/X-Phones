<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>X Phones — by Elon Musk</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white">

  <nav class="fixed top-0 w-full bg-black/90 backdrop-blur border-b border-white/10 z-50">
    <div class="max-w-7xl mx-auto px-6 py-5 flex justify-between items-center">
      <h1 class="text-3xl font-bold text-blue-400">X Phones</h1>
      <div class="flex gap-8 font-medium">
        <a href="index.html" class="hover:text-blue-400">Home</a>
        <a href="shop.html" class="hover:text-blue-400">Shop</a>
      </div>
    </div>
  </nav>

  <!-- Hero -->
  <section class="min-h-screen flex items-center bg-gradient-to-br from-zinc-950 to-black pt-20">
    <div class="max-w-7xl mx-auto px-6 text-center">
      <h1 class="text-7xl md:text-8xl font-bold mb-6">X Phone</h1>
      <p class="text-4xl text-blue-400 mb-8">The phone that understands the universe.</p>
      <a href="shop.html" class="inline-block px-16 py-6 bg-white text-black font-bold text-2xl rounded-2xl hover:bg-blue-400 transition">Shop Now</a>
    </div>
  </section>

  <!-- Models -->
  <section class="py-24 bg-zinc-950">
    <div class="max-w-7xl mx-auto px-6">
      <h2 class="text-5xl font-bold text-center mb-16">The X Phone Collection</h2>
      <div class="grid sm:grid-cols-2 lg:grid-cols-3 gap-10">

        <a href="x-phone.html" class="group block hover:opacity-90 transition">
          <img src="images/x-phone.webp" width="800" height="600" loading="lazy" decoding="async" class="w-full aspect-[4/3] object-cover rounded-3xl mb-6 bg-zinc-900" alt="X Phone">
          <h3 class="text-3xl font-bold">X Phone</h3>
          <p class="text-zinc-400 text-lg">256GB</p>
          <p class="text-blue-400 text-2xl mb-4">$899</p>
        </a>

        <a href="x-phone-plus.html" class="group block hover:opacity-90 transition">
          <img src="images/x-phone-plus.webp" width="800" height="600" loading="lazy" decoding="async" class="w-full aspect-[4/3] object-cover rounded-3xl mb-6 bg-zinc-900" alt="X Phone Plus">
          <h3 class="text-3xl font-bold">X Phone Plus</h3>
          <p class="text-zinc-400 text-lg">512GB</p>
          <p class="text-blue-400 text-2xl mb-4">$1,099</p>
        </a>

        <a href="x-phone-pro.html" class="group block hover:opacity-90 transition scale-105">
          <img src="images/x-phone-pro.webp" width="800" height="600" loading="eager" fetchpriority="high" decoding="async" class="w-full aspect-[4/3] object-cover rounded-3xl mb-6 bg-zinc-900" alt="X Phone Pro">
          <h3 class="text-3xl font-bold">X Phone Pro</h3>
          <p class="text-zinc-400 text-lg">1TB</p>
          <p class="text-blue-400 text-2xl mb-4">$1,299</p>
        </a>

        <a href="x-phone-max.html" class="group block hover:opacity-90 transition">
          <img src="images/x-phone-pro-max.webp" width="800" height="600" loading="lazy" decoding="async" class="w-full aspect-[4/3] object-cover rounded-3xl mb-6 bg-zinc-900" alt="X Phone Max">
          <h3 class="text-3xl font-bold">X Phone Max</h3>
          <p class="text-zinc-400 text-lg">1.5TB</p>
          <p class="text-blue-400 text-2xl mb-4">$1,599</p>
        </a>

        <a href="x-phone-elite.html" class="group block hover:opacity-90 transition">
          <img src="images/x-phone-ultra.webp" width="800" height="600" loading="lazy" decoding="async" class="w-full aspect-[4/3] object-cover rounded-3xl mb-6 bg-zinc-900" alt="X Phone Elite">
          <h3 class="text-3xl font-bold">X Phone Elite</h3>
          <p class="text-zinc-400 text-lg">2TB</p>
          <p class="text-blue-400 text-2xl mb-4">$1,899</p>
        </a>

        <a href="x-phone-ultra.html" class="group block hover:opacity-90 transition">
          <img src="images/x-phone-ultra-max.webp" width="800" height="600" loading="lazy" decoding="async" class="w-full aspect-[4/3] object-cover rounded-3xl mb-6 bg-zinc-900" alt="X Phone Ultra">
          <h3 class="text-3xl font-bold">X Phone Ultra</h3>
          <p class="text-zinc-400 text-lg">2TB + Foldable</p>
          <p class="text-blue-400 text-2xl mb-4">$2,499</p>
        </a>

      </div>
    </div>
  </section>
</body>
</html>
