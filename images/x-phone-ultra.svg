<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" role="img" aria-label="X Phone Ultra">
  <defs>
    <linearGradient id="ultraFrame" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#78716c"/>
      <stop offset="30%" stop-color="#44403c"/>
      <stop offset="70%" stop-color="#292524"/>
      <stop offset="100%" stop-color="#57534e"/>
    </linearGradient>
    <linearGradient id="ultraScreen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1c1917"/>
      <stop offset="100%" stop-color="#0c0a09"/>
    </linearGradient>
    <linearGradient id="ultraGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
  </defs>
  <ellipse cx="300" cy="775" rx="200" ry="24" fill="#000" opacity="0.5"/>
  <!-- Larger titanium body -->
  <rect x="160" y="25" width="280" height="740" rx="52" fill="url(#ultraFrame)" stroke="#a8a29e" stroke-width="3"/>
  <!-- Side buttons -->
  <rect x="152" y="170" width="8" height="60" rx="4" fill="#78716c"/>
  <rect x="152" y="248" width="8" height="90" rx="4" fill="#78716c"/>
  <rect x="440" y="210" width="8" height="110" rx="4" fill="#78716c"/>
  <!-- Screen -->
  <rect x="180" y="65" width="240" height="660" rx="42" fill="#0a0a0a"/>
  <rect x="190" y="95" width="220" height="600" rx="34" fill="url(#ultraScreen)"/>
  <!-- Dynamic island -->
  <rect x="245" y="108" width="110" height="32" rx="16" fill="#000"/>
  <!-- Ultra branding -->
  <rect x="225" y="330" width="150" height="40" rx="20" fill="url(#ultraGold)"/>
  <text x="300" y="357" text-anchor="middle" fill="#1c1917" font-family="system-ui,sans-serif" font-size="18" font-weight="bold" letter-spacing="3">ULTRA</text>
  <text x="300" y="420" text-anchor="middle" fill="#fbbf24" font-family="system-ui,sans-serif" font-size="72" font-weight="bold">5O</text>
  <!-- Quad camera system -->
  <g transform="translate(430, 110)">
    <rect x="-35" y="-5" width="70" height="130" rx="20" fill="#1c1917" stroke="#57534e" stroke-width="2"/>
    <circle cx="-12" cy="20" r="16" fill="#111" stroke="#fbbf24" stroke-width="1.5"/>
    <circle cx="12" cy="20" r="16" fill="#111" stroke="#fbbf24" stroke-width="1.5"/>
    <circle cx="-12" cy="55" r="16" fill="#111" stroke="#fbbf24" stroke-width="1.5"/>
    <circle cx="12" cy="55" r="16" fill="#111" stroke="#fbbf24" stroke-width="1.5"/>
    <circle cx="0" cy="95" r="12" fill="#333"/>
  </g>
  <!-- Satellite indicator -->
  <text x="215" y="130" fill="#fbbf24" font-family="system-ui,sans-serif" font-size="11">9:41 </text>
  <!-- Neural interface widget -->
  <rect x="210" y="470" width="180" height="100" rx="18" fill="#292524" stroke="#fbbf24" stroke-width="1" opacity="0.8"/>
  <text x="300" y="505" text-anchor="middle" fill="#fbbf24" font-family="system-ui,sans-serif" font-size="11" letter-spacing="2">NEURAL LINK</text>
  <text x="300" y="535" text-anchor="middle" fill="#d6d3d1" font-family="system-ui,sans-serif" font-size="14">Active · Synced</text>
  <circle cx="300" cy="555" r="6" fill="#22c55e"/>
  <rect x="260" y="655" width="80" height="4" rx="2" fill="#fbbf24" opacity="0.6"/>
</svg>
