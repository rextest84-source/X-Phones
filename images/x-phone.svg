<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" role="img" aria-label="X Phone">
  <defs>
    <linearGradient id="frame" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3a3a3a"/>
      <stop offset="50%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#2d2d2d"/>
    </linearGradient>
    <linearGradient id="screen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Shadow -->
  <ellipse cx="300" cy="770" rx="180" ry="20" fill="#000" opacity="0.4"/>
  <!-- Phone body -->
  <rect x="175" y="40" width="250" height="700" rx="45" fill="url(#frame)" stroke="#555" stroke-width="2"/>
  <!-- Side buttons -->
  <rect x="168" y="180" width="6" height="50" rx="3" fill="#444"/>
  <rect x="168" y="250" width="6" height="80" rx="3" fill="#444"/>
  <rect x="426" y="220" width="6" height="100" rx="3" fill="#444"/>
  <!-- Screen bezel -->
  <rect x="195" y="80" width="210" height="620" rx="35" fill="#0a0a0a"/>
  <!-- Screen -->
  <rect x="205" y="110" width="190" height="560" rx="28" fill="url(#screen)"/>
  <!-- Dynamic island -->
  <rect x="255" y="125" width="90" height="28" rx="14" fill="#000"/>
  <!-- X logo on screen -->
  <text x="300" y="380" text-anchor="middle" fill="#60a5fa" font-family="system-ui,sans-serif" font-size="72" font-weight="bold">5O</text>
  <text x="300" y="430" text-anchor="middle" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="18" letter-spacing="4">X PHONE</text>
  <!-- Status bar -->
  <text x="220" y="145" fill="#fff" font-family="system-ui,sans-serif" font-size="11">9:41</text>
  <circle cx="375" cy="140" r="3" fill="#fff"/>
  <circle cx="385" cy="140" r="3" fill="#fff"/>
  <rect x="395" y="137" width="18" height="8" rx="2" fill="none" stroke="#fff" stroke-width="1.5"/>
  <!-- App icons row -->
  <circle cx="240" cy="520" r="22" fill="#1d4ed8" opacity="0.8"/>
  <circle cx="300" cy="520" r="22" fill="#2563eb" opacity="0.8"/>
  <circle cx="360" cy="520" r="22" fill="#3b82f6" opacity="0.8"/>
  <!-- Home indicator -->
  <rect x="265" y="640" width="70" height="4" rx="2" fill="#fff" opacity="0.5"/>
  <!-- Camera module on back (visible edge) -->
  <rect x="195" y="80" width="210" height="620" rx="35" fill="url(#shine)"/>
  <!-- X logo on back -->
  <text x="300" y="720" text-anchor="middle" fill="#60a5fa" font-family="system-ui,sans-serif" font-size="28" font-weight="bold" opacity="0.6">5O</text>
</svg>
